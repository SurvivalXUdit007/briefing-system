<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<!-- CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- SECURITY: BLOCK NON-ADMIN USERS -->
<script>
if(localStorage.getItem("role") !== "admin"){
    window.location.href = "/";
}
</script>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <img src="{{ url_for('static', filename='Cargo-and-logistics-logo.png') }}">

        <ul class="sidebar-menu">
            <li><a href="/admin">Dashboard</a></li>
            <li><a href="/create">Create Brief</a></li>
            <li><a href="/admin/history">History</a></li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">
            <h2>Admin Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- STATS -->
        <div class="stats-container">

            <div class="stat-card">
                <h3>Total Employees</h3>
                <p id="totalEmployees">0</p>
            </div>

            <div class="stat-card">
                <h3>Read Briefings</h3>
                <p id="readEmployees">0</p>
            </div>

            <div class="stat-card">
                <h3>Pending Employees</h3>
                <p id="pendingEmployees">0</p>
            </div>

        </div>

        <!-- ACKNOWLEDGEMENT TABLE -->
        <div class="acknowledge-table">

            <h3>Acknowledgement Status</h3>

            <table id="ackTable">

                <tr>
                    <th>Name</th>
                    <th>Employee ID</th>
                    <th>Status</th>
                </tr>

            </table>

        </div>

    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
loadStats();
loadAcknowledgements();
</script>

</body>
</html>
