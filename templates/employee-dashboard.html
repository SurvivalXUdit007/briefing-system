<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>

<!-- CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- SECURITY: BLOCK NON-EMPLOYEES -->
<script>
if(localStorage.getItem("role") !== "employee"){
    window.location.href = "/";
}
</script>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <img src="{{ url_for('static', filename='Cargo-and-logistics-logo.png') }}">

        <ul class="sidebar-menu">
            <li><a href="/employee">Dashboard</a></li>
            <li><a href="/employee/history">Past Briefings</a></li>
        </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- TOP BAR -->
        <div class="topbar">
            <h2>Employee Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- BRIEFING CARD -->
        <div class="brief-card">

            <!-- Week -->
            <h3 id="briefWeek">Loading...</h3>

            <!-- Details -->
            <p id="briefAirline"></p>
            <p id="briefIncident"></p>

            <!-- Circular -->
            <div class="circular-box">
                <p>Airline Circular:</p>
                <a id="briefCircular" href="#" target="_blank">Download Circular</a>
            </div>

            <!-- Ops Comment -->
            <div class="ops-comment">
                <h4>Operations Comment</h4>
                <p id="briefComment"></p>
            </div>

            <!-- Conclusion -->
            <div class="ops-comment">
                <h4>Conclusion</h4>
                <p id="briefConclusion"></p>
            </div>

            <!-- Acknowledge -->
            <button onclick="acknowledgeBrief()">Acknowledge</button>

        </div>

    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
loadLatestBrief();
</script>

</body>
</html>
